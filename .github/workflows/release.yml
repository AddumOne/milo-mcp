name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build

      # Abort if the tag is not reachable from main — prevents accidental
      # releases from feature branches.
      - name: Verify tag is on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor HEAD origin/main \
            || { echo "::error::Tag is not on main — aborting release."; exit 1; }

      # Cache the embedding model so re-releases don't re-download ~25 MB.
      - name: Restore embedding model cache
        id: model-cache
        uses: actions/cache@v4
        with:
          path: resources/models/
          key: embedding-model-${{ env.EMBEDDING_MODEL || 'Xenova_all-MiniLM-L6-v2' }}

      - name: Fetch embedding model
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: npm run fetch:model

      # Build the Claude Desktop bundle (includes pre-fetched model).
      - name: Pack MCPB bundle
        run: npm run pack:mcpb

      # --ignore-scripts suppresses the prepack hook (build already ran above).
      - name: Publish to npm
        run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Create the GitHub Release and attach the bundle.
      # --generate-notes auto-fills release notes from PR titles / commits.
      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            *.mcpb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
